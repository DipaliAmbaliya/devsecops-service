name: DevSecOps Spring Boot Pipeline

on:
  push:
    branches: ["master"]
  pull_request:

env:
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true

jobs:
  security-pipeline:
    runs-on: ubuntu-latest

    permissions:
      contents: read
      security-events: write

    steps:
      # 📥 Checkout Code (FIXED for Gitleaks)
      - name: Checkout
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      # 🔐 Secret Scanning (Gitleaks - FIXED)
      - name: Gitleaks Scan
        uses: gitleaks/gitleaks-action@v2
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}

      # 🔍 CodeQL Init (SAST)
      - name: Initialize CodeQL
        uses: github/codeql-action/init@v3
        with:
          languages: java

      - name: Setup Java 21
        uses: actions/setup-java@v4
        with:
          distribution: 'temurin'
          java-version: '21'
          cache: maven

      # ☕ Build Project
      - name: Build with Maven
        run: mvn clean install -DskipTests

      # 🔍 SonarQube Scan (SAST)
      - name: Sonar Scan
        continue-on-error: true
        run: |
          mvn sonar:sonar \
            -Dsonar.projectKey=springboot-devsecops \
            -Dsonar.organization=${{ secrets.SONAR_ORG }} \
            -Dsonar.host.url=https://sonarcloud.io \
            -Dsonar.login=${{ secrets.SONAR_TOKEN }} \
            -Dsonar.qualitygate.wait=true

      # 🔍 Dependency Scan (Snyk CLI)
      - name: Install Snyk
        run: npm install -g snyk

      - name: Run Snyk Scan
        env:
          SNYK_TOKEN: ${{ secrets.SNYK_TOKEN }}
        run: |
          snyk auth $SNYK_TOKEN
          snyk test || true

      # 🐳 Build Docker Image
      - name: Build Docker Image
        run: docker build -t springboot-devsecops .

      # 🐳 Container Scan (Trivy CLI - STABLE)
      - name: Install Trivy
        run: |
          sudo apt-get update
          sudo apt-get install wget apt-transport-https gnupg lsb-release -y
          wget -qO - https://aquasecurity.github.io/trivy-repo/deb/public.key | sudo apt-key add -
          echo "deb https://aquasecurity.github.io/trivy-repo/deb $(lsb_release -sc) main" | sudo tee /etc/apt/sources.list.d/trivy.list
          sudo apt-get update
          sudo apt-get install trivy -y

      - name: Run Trivy Scan
        run: |
          trivy image --severity CRITICAL,HIGH --exit-code 1 springboot-devsecops

      # 🔍 CodeQL Analysis
      - name: Perform CodeQL Analysis
        uses: github/codeql-action/analyze@v3

      # 🚀 Deploy (Mock)
      - name: Deploy
        run: echo "Deployment successful"
