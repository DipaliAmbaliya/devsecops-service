name: DevSecOps Spring Boot Pipeline

on:
  push:
    branches: ["master"]
  pull_request:

jobs:
  security-pipeline:
    runs-on: ubuntu-latest

    permissions:
      contents: read
      security-events: write

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      # 🔐 Secret Scanning (FIXED)
      - name: TruffleHog Scan
        uses: trufflesecurity/trufflehog@main
        with:
          path: .
          fail: true

      # 🔍 CodeQL Init
      - name: Initialize CodeQL
        uses: github/codeql-action/init@v3
        with:
          languages: java

      # ☕ Build
      - name: Build with Maven
        run: mvn clean install -DskipTests

      # 🔍 SonarQube Scan (FIXED)
      # - name: SonarQube Scan
      #   run: mvn sonar:sonar \
      #     -Dsonar.projectKey=springboot-devsecops \
      #     -Dsonar.host.url=${{ secrets.SONAR_HOST_URL }} \
      #     -Dsonar.login=${{ secrets.SONAR_TOKEN }} \
      #     -Dsonar.qualitygate.wait=true

      # 🔍 Snyk Scan (FIXED VERSION)
      - name: Snyk Scan
        uses: snyk/actions/maven@v3
        env:
          SNYK_TOKEN: ${{ secrets.SNYK_TOKEN }}
        with:
          args: test

      # 🐳 Build Docker
      - name: Build Docker Image
        run: docker build -t springboot-devsecops .

      # 🐳 Trivy Scan (FIXED VERSION)
      - name: Trivy Scan
        uses: aquasecurity/trivy-action@0.20.0
        with:
          image-ref: springboot-devsecops
          format: table
          exit-code: 1
          severity: CRITICAL,HIGH

      # 🔍 CodeQL Analysis
      - name: Perform CodeQL Analysis
        uses: github/codeql-action/analyze@v3

      # 🚀 Deploy
      - name: Deploy
        run: echo "Deployment successful"
