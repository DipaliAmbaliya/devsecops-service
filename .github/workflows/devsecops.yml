name: DevSecOps Spring Boot Pipeline

on:
  push:
    branches: ["master"]
  pull_request:
env:
  ACTIONS_ALLOW_USE_UNSECURE_NODE_VERSION: true
jobs:
  security-pipeline:
    runs-on: ubuntu-latest

    permissions:
      contents: read
      security-events: write

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      # 🔐 Secret Scanning (TruffleHog via CLI)
      - name: Install TruffleHog (latest)
        run: |
          wget https://github.com/trufflesecurity/trufflehog/releases/latest/download/trufflehog_3.63.2_linux_amd64.tar.gz
          tar -xvzf trufflehog_3.63.2_linux_amd64.tar.gz
          sudo mv trufflehog /usr/local/bin/

      - name: Run TruffleHog Scan
        run: |
          trufflehog filesystem . --fail --no-update

      # 🔍 CodeQL Init (Stable Action)
      - name: Initialize CodeQL
        uses: github/codeql-action/init@v3
        with:
          languages: java

      # ☕ Build Project
      - name: Build with Maven
        run: mvn clean install -DskipTests

      # 🔍 SonarQube Scan (SAST)
      - name: SonarQube Scan
        run: mvn sonar:sonar \
          -Dsonar.projectKey=springboot-devsecops \
          -Dsonar.host.url=${{ secrets.SONAR_HOST_URL }} \
          -Dsonar.login=${{ secrets.SONAR_TOKEN }} \
          -Dsonar.qualitygate.wait=true

      # 🔍 Dependency Scan (Snyk via CLI)
      - name: Install Snyk
        run: npm install -g snyk

      - name: Run Snyk Scan
        env:
          SNYK_TOKEN: ${{ secrets.SNYK_TOKEN }}
        run: |
          snyk auth $SNYK_TOKEN
          snyk test

      # 🐳 Build Docker Image
      - name: Build Docker Image
        run: docker build -t springboot-devsecops .

      # 🐳 Container Scan (Trivy via CLI)
      - name: Install Trivy
        run: |
          sudo apt-get update
          sudo apt-get install wget -y
          wget https://github.com/aquasecurity/trivy/releases/latest/download/trivy_0.50.0_Linux-64bit.deb
          sudo dpkg -i trivy_0.50.0_Linux-64bit.deb

      - name: Scan Docker Image
        run: |
          trivy image --severity CRITICAL,HIGH --exit-code 1 springboot-devsecops

      # 🔍 CodeQL Analysis
      - name: Perform CodeQL Analysis
        uses: github/codeql-action/analyze@v3

      # 🚀 Deploy (Mock)
      - name: Deploy
        run: echo "Deployment successful"
